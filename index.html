<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>La Machine à Invocation</title>
</head>

<body>
    <main class="container">
        <section>
            <h1> La Machine à Invocation</h1>
            <form id="formulaire" class="formulaire">
                <label for="prenom">Prénom</label>
                <input id="prenom" />

                <label for="creature">Choisis ta créature</label>
                <select id="creature">
                    <option>
                        🐙 le Chat-Octo
                    </option>
                    <option>
                        🐉 le Dragon-Debug
                    </option>
                    <option>
                        🦄 la Licorne-CSS
                    </option>
                    <option>
                        🦊 le Renard-Refacto
                    </option>
                </select>

                <button type="submit" class="btn-invoque">Invoque ta créature</button>
            </form>
        </section>

        <section id="resultat" class="cache">
            <p id="message">a entendu ton appel et te suivra tout le Bloc 1 !</p>
            <button id="recommencer">Renvoyer la créature</button>
        </section>
    </main>

    <script src="script.js"></script>

</body>

</html>
