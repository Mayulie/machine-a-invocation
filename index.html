<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>La Machine à Invocation</title>
</head>

<body>
    <main class="container">
        <section>
            <h1> La Machine à Invocation</h1>
            <form id="invocation">
                <label for="prenom">Prénom</label>
                <input id="prenom" />
                <br>
                <label for="creature">Choisis ta créature</label>
                <select id="creature">
                    <option>
                        🐙 le Chat-Octo
                    </option>
                    <option>
                        🐉 le Dragon-Debug
                    </option>
                    <option>
                        🦄 la Licorne-CSS
                    </option>
                    <option>
                        🦊 le Renard-Refacto
                    </option>
                </select>
                <br>
                <button type="submit">Invoque ta créature</button>
            </form>
        </section>

        <section id="resultat" class="cache">
            <p id="message"></p>
        </section>
    </main>
</body>

</html>
